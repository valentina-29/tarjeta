name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write      # Recomendado para despliegues a Pages
  id-token: write   # Recomendado para despliegues a Pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # REEMPLAZA EL TEXTO "PROD_SCRIPT_URL_PLACEHOLDER" EN TU SCRIPT.JS
      - name: Inyectar URL de Apps Script
        env:
          SCRIPT_URL: ${{ secrets.SCRIPT_URL }}
        run: |
          sed -i "s|PROD_SCRIPT_URL_PLACEHOLDER|$SCRIPT_URL|g" script.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4